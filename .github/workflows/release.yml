name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Check tag format
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must use the format v<major>.<minor>, for example v1.3."
            exit 1
          fi

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_NOTES_PATH="$RUNNER_TEMP/release-notes.md"

          gh api \
            --method POST \
            "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$GITHUB_SHA" \
            --jq '.body' > "$RELEASE_NOTES_PATH"

          echo "RELEASE_NOTES_PATH=$RELEASE_NOTES_PATH" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --notes-file "$RELEASE_NOTES_PATH" \
            --title "$RELEASE_TAG"
